name: f1-strategist
version: 1.0.0
description: >
  LLM race-strategy arena. Agent acts as the F1 race strategist on the pit wall:
  calls pit timing, picks tyre compounds, sets drive modes, manages fuel, defends
  position, and sends radio comms over a 10-15 lap race. Features hidden state
  revealed by inspection actions (true tyre wear, opponent strategies, weather
  forecast, undercut viability), pre-rolled weather and safety-car events, and
  six-dimensional multi-objective scoring.

author: Shashwat Rajan, Tanish Shitanshu
tags:
  - long-horizon
  - world-model
  - formula-one
  - strategy
  - partial-observability

entrypoint: server.app:app
container:
  dockerfile: Dockerfile
  port: 8000

action_class: models.F1Action
observation_class: models.F1Observation
state_class: models.F1State
client_class: client.F1StrategistEnv
